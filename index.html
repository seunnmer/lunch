<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>점심 메뉴 룰렛</title>
  <meta name="description" content="먹고 싶은 메뉴를 추가하고 룰렛을 돌려 오늘의 점심 메뉴를 골라보세요." />
  <meta name="theme-color" content="#89ddd2" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="점심 메뉴 룰렛" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="점심 메뉴 룰렛" />
  <meta property="og:description" content="먹고 싶은 메뉴를 추가하고 룰렛을 돌려 오늘의 점심 메뉴를 정해보세요." />
  <meta property="og:image" content="./점심 메뉴 룰렛 오픈그래프 이미지.png" />
  <meta property="og:locale" content="ko_KR" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="점심 메뉴 룰렛" />
  <meta name="twitter:description" content="먹고 싶은 메뉴를 추가하고 룰렛을 돌려 오늘의 점심 메뉴를 정해보세요." />
  <meta name="twitter:image" content="./점심 메뉴 룰렛 오픈그래프 이미지.png" />
  <link rel="icon" href="./점심 메뉴 룰렛 앱 아이콘.png" />
  <link rel="apple-touch-icon" href="./점심 메뉴 룰렛 앱 아이콘.png" />
  <link rel="manifest" href="./manifest.json" />
  <script src="https://seunnmer.github.io/lunch/"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #fff7fb 0%, #e8fff9 100%);
      color: #2b2b2b;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .app {
      width: min(1100px, 94vw);
      margin: 0 auto;
      padding: 16px 0 28px;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
      align-items: start;
    }
    .panel, .roulette-panel {
      background: rgba(255,255,255,0.95);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 12px 28px rgba(255,182,193,0.2);
      backdrop-filter: blur(10px);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 32px;
      line-height: 1.15;
      word-break: keep-all;
    }
    .desc {
      margin: 0 0 16px;
      color: #6a6a6a;
      font-size: 15px;
      line-height: 1.5;
    }
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }
    input {
      flex: 1;
      min-width: 0;
      border: 1px solid #ffd6e7;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 16px;
      background: #fff;
      outline: none;
    }
    input:focus {
      border-color: #7be3d6;
      box-shadow: 0 0 0 4px rgba(123,227,214,0.2);
    }
    button {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }
    button:hover { transform: translateY(-1px); }
    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }
    .add-btn {
      background: #ffd6e7;
      color: #3a2f35;
      flex: 0 0 90px;
    }
    .spin-btn {
      width: 100%;
      background: #89ddd2;
      color: #fff;
      margin-top: 14px;
      min-height: 54px;
      font-size: 17px;
    }
    .reset-btn {
      width: 100%;
      background: #e0f7f5;
      color: #35514d;
      margin-top: 10px;
      min-height: 54px;
    }
    .menu-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
      min-height: 42px;
      align-items: flex-start;
    }
    .menu-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #fff0f6;
      border: 1px solid #ffd6e7;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 15px;
      max-width: 100%;
    }
    .chip-remove {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      padding: 0;
      background: #ffe3f0;
      color: #8c5c70;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
    }
    .hint {
      margin-top: 12px;
      font-size: 13px;
      color: #7a746b;
      line-height: 1.45;
    }
    .roulette-wrap {
      position: relative;
      width: min(520px, 90vw);
      aspect-ratio: 1 / 1;
      margin: 0 auto;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .pointer {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 16px solid transparent;
      border-right: 16px solid transparent;
      border-top: 28px solid #ff8fb1;
      z-index: 10;
    }
    .wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      border: 8px solid #ffe3f0;
      background: #fff;
      box-shadow: 0 10px 24px rgba(255, 182, 193, 0.18);
      transform-origin: 50% 50%;
      will-change: transform;
    }
    .wheel svg {
      width: 100%;
      height: 100%;
      display: block;
    }
    .center-cap {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #fff;
      border: 6px solid #c8f5ef;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #3b4442;
      z-index: 5;
      box-shadow: 0 4px 12px rgba(123,227,214,0.18);
    }
    .result {
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      margin-top: 14px;
      min-height: 34px;
      color: #ff6fa5;
    }
    .sub-result {
      text-align: center;
      color: #7a746b;
      font-size: 14px;
      min-height: 22px;
      margin-top: 6px;
    }
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(42, 34, 40, 0.26);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      z-index: 100;
    }
    .modal-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }
    .celebration-modal {
      background: linear-gradient(180deg, #fff5fa 0%, #f1fffc 100%);
      border: 2px solid #ffe0ee;
      border-radius: 22px;
      padding: 24px;
      text-align: center;
      min-width: min(340px, 88vw);
      box-shadow: 0 18px 40px rgba(255,182,193,0.22);
    }
    .celebration-title {
      margin: 0 0 10px;
      font-size: 24px;
      color: #5f5560;
    }
    .celebration-menu {
      font-size: 30px;
      font-weight: 700;
      color: #ff6fa5;
      margin-bottom: 8px;
    }
    .modal-close {
      background: #89ddd2;
      color: #fff;
      margin-top: 16px;
      min-width: 120px;
    }
    .confetti {
      position: fixed;
      width: 12px;
      height: 18px;
      border-radius: 3px;
      z-index: 110;
      pointer-events: none;
      opacity: 0;
    }
    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
        width: min(100%, 680px);
        padding: 16px 12px 24px;
        gap: 16px;
      }
      .roulette-panel { order: -1; }
      .roulette-wrap { width: min(520px, 88vw); }
    }
    @media (max-width: 640px) {
      .app {
        width: 100%;
        padding: 12px 10px 18px;
        gap: 14px;
      }
      .panel, .roulette-panel {
        padding: 16px;
        border-radius: 18px;
      }
      h1 { font-size: 24px; }
      .desc { font-size: 14px; }
      .add-btn { flex-basis: 82px; }
      .roulette-wrap { width: min(92vw, 460px); }
      .center-cap {
        width: 72px;
        height: 72px;
        font-size: 12px;
      }
      .result { font-size: 20px; }
      .celebration-modal {
        min-width: min(300px, 90vw);
        padding: 20px;
      }
      .celebration-menu { font-size: 26px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="panel">
      <h1>점심 메뉴 룰렛</h1>
      <p class="desc">먹고 싶은 메뉴를 추가한 뒤 룰렛을 돌리면, 오늘의 점심이 무작위로 결정됩니다.</p>
      <div class="input-row">
        <input id="menuInput" type="text" placeholder="메뉴 입력" maxlength="12" />
        <button class="add-btn" id="addBtn">추가</button>
      </div>
      <div class="menu-list" id="menuList"></div>
      <button class="spin-btn" id="spinBtn">룰렛 돌리기</button>
      <button class="reset-btn" id="resetBtn">초기화</button>
      <p class="hint">메뉴는 최소 2개 이상 있어야 합니다.</p>
    </section>

    <section class="roulette-panel">
      <div class="roulette-wrap">
        <div class="pointer"></div>
        <div class="wheel" id="wheel"></div>
        <div class="center-cap">LUNCH</div>
      </div>
      <div class="result" id="result"></div>
      <div class="sub-result" id="subResult">룰렛을 돌리면 결과가 여기에 표시됩니다</div>
    </section>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="celebration-modal" id="celebrationModal">
      <h2 class="celebration-title">오늘의 점심</h2>
      <div class="celebration-menu" id="celebrationMenu"></div>
      <button class="modal-close" id="modalCloseBtn">확인</button>
    </div>
  </div>

  <script>
    const defaultMenus = ['김치찌개', '돈까스', '비빔밥', '쌀국수', '햄버거', '초밥'];
    let menus = [...defaultMenus];
    let isSpinning = false;
    let currentRotation = 0;

    const menuInput = document.getElementById('menuInput');
    const addBtn = document.getElementById('addBtn');
    const spinBtn = document.getElementById('spinBtn');
    const resetBtn = document.getElementById('resetBtn');
    const wheel = document.getElementById('wheel');
    const result = document.getElementById('result');
    const subResult = document.getElementById('subResult');
    const menuList = document.getElementById('menuList');
    const modal = document.getElementById('modalOverlay');
    const celebrationModal = document.getElementById('celebrationModal');
    const menuText = document.getElementById('celebrationMenu');
    const modalCloseBtn = document.getElementById('modalCloseBtn');

    const colors = ['#ffd6e7', '#c8f5ef', '#ffe3f0', '#d9fff8', '#ffdbe9', '#cef7f1', '#ffe9f3', '#defdfa'];
    const confettiColors = ['#ff8fb1', '#89ddd2', '#ffd6e7', '#c8f5ef', '#ffc7dd', '#b8f0e8'];

    let audioCtx = null;
    let tickTimer = null;

    function getAudioCtx() {
      if (!audioCtx) {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (AudioContextClass) audioCtx = new AudioContextClass();
      }
      return audioCtx;
    }

    function safeResumeAudio() {
      const ctx = getAudioCtx();
      if (ctx && ctx.state === 'suspended') ctx.resume();
    }

    function playTone({ frequency = 440, type = 'sine', duration = 0.12, volume = 0.03, startTime = 0 } = {}) {
      const ctx = getAudioCtx();
      if (!ctx) return;
      const now = ctx.currentTime + startTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(frequency, now);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(volume, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now);
      osc.stop(now + duration + 0.02);
    }

    function playWinSound() {
      safeResumeAudio();
      playTone({ frequency: 523.25, type: 'triangle', duration: 0.18, volume: 0.045, startTime: 0.00 });
      playTone({ frequency: 659.25, type: 'triangle', duration: 0.20, volume: 0.045, startTime: 0.06 });
      playTone({ frequency: 783.99, type: 'triangle', duration: 0.24, volume: 0.042, startTime: 0.12 });
      playTone({ frequency: 1046.5, type: 'triangle', duration: 0.34, volume: 0.05, startTime: 0.18 });
    }

    function startSpinTick(totalDuration = 5.4) {
      safeResumeAudio();
      stopSpinTick();
      const start = performance.now();
      const loop = () => {
        const elapsed = (performance.now() - start) / 1000;
        const progress = Math.min(elapsed / totalDuration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const interval = 42 + eased * 260;
        playTone({ frequency: 180 - eased * 50 + Math.random() * 10, type: 'square', duration: 0.028, volume: 0.018 });
        if (progress < 1 && isSpinning) tickTimer = setTimeout(loop, interval);
      };
      loop();
    }

    function stopSpinTick() {
      if (tickTimer) {
        clearTimeout(tickTimer);
        tickTimer = null;
      }
    }

    function polarToCartesian(cx, cy, r, angle) {
      const rad = (angle - 90) * Math.PI / 180;
      return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
    }

    function describeSector(cx, cy, r, startAngle, endAngle) {
      const start = polarToCartesian(cx, cy, r, endAngle);
      const end = polarToCartesian(cx, cy, r, startAngle);
      const largeArcFlag = endAngle - startAngle <= 180 ? 0 : 1;
      return `M ${cx} ${cy} L ${start.x} ${start.y} A ${r} ${r} 0 ${largeArcFlag} 0 ${end.x} ${end.y} Z`;
    }

    function createWheelSVG(items) {
      const size = 600;
      const cx = 300;
      const cy = 300;
      const radius = 292;
      const sliceAngle = 360 / items.length;
      const textRadius = items.length >= 10 ? 205 : items.length >= 8 ? 195 : 180;
      const fontSize = items.length >= 10 ? 14 : items.length >= 8 ? 16 : 20;
      let paths = '';
      let labels = '';

      items.forEach((item, index) => {
        const startAngle = index * sliceAngle;
        const endAngle = startAngle + sliceAngle;
        const midAngle = startAngle + sliceAngle / 2;
        const textPos = polarToCartesian(cx, cy, textRadius, midAngle);
        paths += `<path d="${describeSector(cx, cy, radius, startAngle, endAngle)}" fill="${colors[index % colors.length]}" stroke="#ffffff" stroke-width="3"></path>`;
        labels += `<text x="${textPos.x}" y="${textPos.y}" text-anchor="middle" dominant-baseline="middle" font-size="${fontSize}" font-weight="700" fill="#3a3a3a">${item}</text>`;
      });

      return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg" aria-label="점심 메뉴 룰렛">${paths}${labels}</svg>`;
    }

    function renderMenuList() {
      menuList.innerHTML = '';
      menus.forEach((menu, index) => {
        const chip = document.createElement('div');
        chip.className = 'menu-chip';
        chip.innerHTML = `<span>${menu}</span><button class="chip-remove" data-index="${index}" ${isSpinning ? 'disabled' : ''}>×</button>`;
        menuList.appendChild(chip);
      });
      document.querySelectorAll('.chip-remove').forEach((btn) => {
        btn.addEventListener('click', () => {
          if (isSpinning) return;
          const index = Number(btn.dataset.index);
          menus.splice(index, 1);
          updateUI();
        });
      });
    }

    function renderWheel() {
      wheel.innerHTML = createWheelSVG(menus);
      gsap.set(wheel, { rotate: currentRotation });
    }

    function updateButtons() {
      spinBtn.disabled = menus.length < 2 || isSpinning;
      addBtn.disabled = isSpinning;
      resetBtn.disabled = isSpinning;
      menuInput.disabled = isSpinning;
    }

    function updateUI() {
      renderMenuList();
      renderWheel();
      updateButtons();
    }

    function addMenu() {
      const value = menuInput.value.trim();
      if (!value || isSpinning) return;
      if (menus.includes(value)) {
        subResult.textContent = '이미 같은 메뉴가 있습니다';
        return;
      }
      menus.push(value);
      menuInput.value = '';
      subResult.textContent = '메뉴가 추가되었습니다';
      updateUI();
    }

    function burstConfetti() {
      const rect = celebrationModal.getBoundingClientRect();
      const originX = rect.left + rect.width / 2;
      const originY = rect.top + rect.height / 2;
      for (let i = 0; i < 36; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti';
        piece.style.background = confettiColors[i % confettiColors.length];
        document.body.appendChild(piece);
        const angle = (Math.PI * 2 * i) / 36 + (Math.random() - 0.5) * 0.5;
        const distance = 90 + Math.random() * 150;
        const x = Math.cos(angle) * distance;
        const y = Math.sin(angle) * distance - 20;
        const rotation = (Math.random() * 720) - 360;
        gsap.fromTo(piece,
          { x: originX, y: originY, opacity: 1, scale: 0.6, rotate: 0 },
          {
            x: originX + x,
            y: originY + y,
            opacity: 0,
            scale: 1,
            rotate: rotation,
            duration: 1.1 + Math.random() * 0.35,
            ease: 'power2.out',
            onComplete: () => piece.remove()
          }
        );
      }
    }

    function showModal(menu) {
      menuText.textContent = menu;
      modal.classList.add('show');
      gsap.fromTo(celebrationModal,
        { scale: 0.9, y: 18, opacity: 0 },
        { scale: 1, y: 0, opacity: 1, duration: 0.35, ease: 'back.out(1.7)', onComplete: burstConfetti }
      );
      playWinSound();
    }

    function hideModal() {
      modal.classList.remove('show');
    }

    function spinRoulette() {
      if (menus.length < 2 || isSpinning) return;
      safeResumeAudio();
      hideModal();
      isSpinning = true;
      subResult.textContent = '오늘의 점심을 고르고 있습니다';
      const sliceAngle = 360 / menus.length;
      const selectedIndex = Math.floor(Math.random() * menus.length);
      const selectedMenu = menus[selectedIndex];
      const sliceCenter = selectedIndex * sliceAngle + sliceAngle / 2;
      const targetOnWheel = (360 - sliceCenter) % 360;
      const fullSpins = 5 + Math.floor(Math.random() * 3);
      const normalizedCurrent = ((currentRotation % 360) + 360) % 360;
      const delta = ((targetOnWheel - normalizedCurrent) + 360) % 360;
      const finalRotation = currentRotation + fullSpins * 360 + delta;
      const duration = 5.4;
      startSpinTick(duration);
      gsap.to(wheel, {
        rotate: finalRotation,
        duration,
        ease: 'power4.out',
        onComplete: () => {
          stopSpinTick();
          currentRotation = finalRotation;
          isSpinning = false;
          result.textContent = selectedMenu;
          subResult.textContent = '오늘 점심은 이 메뉴로 결정되었습니다';
          updateUI();
          showModal(selectedMenu);
        }
      });
      updateButtons();
    }

    addBtn.addEventListener('click', addMenu);
    spinBtn.addEventListener('click', spinRoulette);
    resetBtn.addEventListener('click', () => {
      if (isSpinning) return;
      hideModal();
      menus = [...defaultMenus];
      currentRotation = 0;
      result.textContent = '';
      subResult.textContent = '룰렛을 돌리면 결과가 여기에 표시됩니다';
      updateUI();
    });
    menuInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        addMenu();
      }
    });
    modalCloseBtn.addEventListener('click', hideModal);
    modal.addEventListener('click', (event) => {
      if (event.target === modal) hideModal();
    });

    updateUI();

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch((error) => {
          console.error('Service Worker registration failed:', error);
        });
      });
    }
  </script>
</body>
</html>
